# All AI functions now require a valid JWT (anon or user session).
# Stops random external callers from burning the Gemini / Lovable API budget.
[functions.generate-summary]
verify_jwt = true

[functions.ai-post-analysis]
verify_jwt = true

[functions.ai-conversation-starters]
verify_jwt = true

[functions.ai-comment-reply]
verify_jwt = true

[functions.ai-assistant]
verify_jwt = true

[functions.ai-search]
verify_jwt = true

# Memo system: invoked by triggers via service-role; no JWT
[functions.process-memo-ai]
verify_jwt = false

[functions.dispatch-memo-pushes]
verify_jwt = false
