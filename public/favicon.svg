<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Brand mark: solid white back disc + 45%-opacity white front disc
       on the brand-primary blue. The semi-transparent front lets the
       blue bleed through where it sits alone, giving a glassmorphism
       step against the back disc. -->
  <rect width="40" height="40" rx="8" fill="#2563eb"/>
  <circle cx="14" cy="20" r="10" fill="#FFFFFF"/>
  <circle cx="26" cy="20" r="10" fill="#FFFFFF" fill-opacity="0.45"/>
</svg>
