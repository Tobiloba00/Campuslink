<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <defs>
    <linearGradient id="cardA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafbff"/>
    </linearGradient>
    <linearGradient id="checkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafbff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1e1b4b" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Decorative dots (white-on-blue, since this sits on a primary gradient bg) -->
  <circle cx="14" cy="22" r="2.5" fill="#ffffff" opacity="0.55"/>
  <circle cx="186" cy="30" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="20" cy="138" r="2" fill="#ffffff" opacity="0.45"/>
  <circle cx="184" cy="120" r="2.5" fill="#ffffff" opacity="0.55"/>

  <!-- Back card: chat bubble (left) -->
  <g transform="translate(14 56) rotate(-8 36 22)" filter="url(#softShadow)">
    <path d="M 6 0 H 56 Q 62 0 62 6 V 32 Q 62 38 56 38 H 22 L 14 46 V 38 H 6 Q 0 38 0 32 V 6 Q 0 0 6 0 Z" fill="url(#bubble)"/>
    <circle cx="18" cy="19" r="2.2" fill="#a5b4fc"/>
    <circle cx="28" cy="19" r="2.2" fill="#a5b4fc"/>
    <circle cx="38" cy="19" r="2.2" fill="#a5b4fc"/>
  </g>

  <!-- Hero: task card (center) — uses app's design language -->
  <g transform="translate(54 32)" filter="url(#softShadow)">
    <rect width="118" height="84" rx="14" fill="url(#cardA)" stroke="#c7d2fe" stroke-width="1.4"/>

    <!-- Title bar -->
    <rect x="14" y="14" width="68" height="7" rx="3.5" fill="#4f46e5"/>

    <!-- Description lines -->
    <rect x="14" y="29" width="56" height="4.5" rx="2.25" fill="#e0e7ff"/>
    <rect x="14" y="38" width="44" height="4.5" rx="2.25" fill="#e0e7ff"/>

    <!-- Price chip -->
    <rect x="14" y="52" width="34" height="11" rx="5.5" fill="#d1fae5"/>
    <circle cx="20" cy="57.5" r="1.8" fill="#10b981"/>
    <rect x="24" y="55.5" width="20" height="4" rx="2" fill="#10b981"/>

    <!-- Bottom row: avatar + line + button -->
    <circle cx="20" cy="73" r="5" fill="#a5b4fc"/>
    <rect x="29" y="71" width="32" height="4" rx="2" fill="#e0e7ff"/>
    <rect x="80" y="68" width="24" height="11" rx="5.5" fill="#4f46e5"/>
    <rect x="86" y="71.5" width="12" height="4" rx="2" fill="#ffffff" opacity="0.95"/>

    <!-- Status pill top-right -->
    <rect x="92" y="11" width="20" height="11" rx="5.5" fill="#fef3c7"/>
    <circle cx="98" cy="16.5" r="1.5" fill="#f59e0b"/>
    <rect x="101" y="14.5" width="9" height="4" rx="2" fill="#f59e0b"/>
  </g>

  <!-- Front floating: green checkmark badge (bottom-right) -->
  <g transform="translate(146 102)" filter="url(#softShadow)">
    <circle cx="18" cy="18" r="18" fill="url(#checkBg)"/>
    <path d="M 10 18 L 16 24 L 26 13" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Sparkles -->
  <g transform="translate(170 14)">
    <path d="M 8 0 L 9.4 5.7 L 15 7 L 9.4 8.3 L 8 14 L 6.6 8.3 L 1 7 L 6.6 5.7 Z" fill="#fbbf24"/>
  </g>
  <g transform="translate(8 100)">
    <path d="M 6 0 L 7 4 L 11 5 L 7 6 L 6 10 L 5 6 L 1 5 L 5 4 Z" fill="#fbbf24"/>
  </g>
</svg>
